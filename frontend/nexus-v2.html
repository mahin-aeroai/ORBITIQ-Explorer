<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ORBITIQ NEXUS V2 — Aerospace Intelligence Platform</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#020c1b;--bg1:#071428;--bg2:#0c1f3d;--bg3:#0a1628;
  --blue:#2563eb;--cyan:#0891b2;--purple:#7c3aed;--green:#059669;
  --amber:#d97706;--red:#dc2626;--indigo:#4f46e5;
  --blue-l:#60a5fa;--cyan-l:#22d3ee;--purple-l:#a78bfa;
  --green-l:#34d399;--amber-l:#fbbf24;--red-l:#fca5a5;
  --t1:#f8fafc;--t2:#94a3b8;--t3:#475569;
  --bd:rgba(37,99,235,.18);--bd2:rgba(37,99,235,.4);
  --font:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  --mono:'SF Mono','Fira Code','Consolas',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--t1);font-family:var(--font);overflow:hidden}
#bg{position:fixed;inset:0;z-index:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:tw var(--d,3s) ease-in-out infinite alternate}
@keyframes tw{0%{opacity:.04}100%{opacity:.55}}
#app{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column}

/* HEADER */
#hdr{height:50px;padding:0 18px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between;background:rgba(2,12,27,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bd);position:relative}
#hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan-l),var(--purple),transparent);opacity:.6}
.logo{display:flex;align-items:center;gap:10px}
.logo-orb{width:30px;height:30px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--purple));display:flex;align-items:center;justify-content:center;font-size:14px;box-shadow:0 0 12px rgba(37,99,235,.5)}
.logo-name{font-size:14px;font-weight:800;letter-spacing:.1em;background:linear-gradient(135deg,#fff,var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.logo-v2{font-size:10px;font-weight:700;color:var(--amber-l);letter-spacing:.1em;margin-left:4px;padding:1px 5px;border:1px solid rgba(217,119,6,.4);border-radius:4px;-webkit-text-fill-color:var(--amber-l)}
.logo-tag{font-size:9px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;margin-top:1px}
.hdr-stats{display:flex;align-items:center;gap:8px}
.hstat{display:flex;align-items:center;gap:4px;font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid var(--bd);background:rgba(7,20,40,.6)}
.hstat .n{font-weight:700;color:var(--cyan-l)}
.hstat .l{color:var(--t3)}
.ws-badge{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase}

/* BODY */
#body{display:flex;flex:1;min-height:0}

/* LEFT NAV */
#nav{width:200px;flex-shrink:0;background:rgba(7,14,28,.8);backdrop-filter:blur(10px);border-right:1px solid var(--bd);overflow-y:auto;padding:10px 0;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.nav-section{margin-bottom:4px}
.nav-lbl{font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;padding:6px 12px 3px}
.nav-btn{width:100%;padding:8px 12px;background:none;border:none;border-left:2px solid transparent;cursor:pointer;text-align:left;transition:.13s;display:flex;align-items:center;gap:7px}
.nav-btn:hover{background:rgba(37,99,235,.07);border-left-color:rgba(37,99,235,.25)}
.nav-btn.on{background:rgba(37,99,235,.12);border-left-color:var(--blue-l)}
.nav-ico{font-size:13px;flex-shrink:0}
.nav-text{font-size:12px;color:var(--t2);font-weight:500;transition:.13s}
.nav-btn.on .nav-text{color:var(--cyan-l);font-weight:600}
.nav-btn:hover .nav-text{color:var(--t1)}
.nav-count{margin-left:auto;font-size:9px;padding:1px 5px;border-radius:99px;background:rgba(37,99,235,.15);color:var(--blue-l);border:1px solid rgba(37,99,235,.25)}

/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden}

/* WORKSTREAM HEADER */
#ws-hdr{
  flex-shrink:0;padding:12px 16px 10px;
  background:rgba(7,14,28,.85);backdrop-filter:blur(10px);
  border-bottom:1px solid var(--bd);
}
.ws-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.ws-title{font-size:15px;font-weight:700;color:var(--t1);display:flex;align-items:center;gap:8px}
.ws-sub{font-size:11px;color:var(--t3);margin-top:2px}
.ws-actions{display:flex;gap:6px}
.btn{padding:7px 14px;border:none;border-radius:7px;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
.btn-primary{background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;box-shadow:0 3px 12px rgba(37,99,235,.3)}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 5px 18px rgba(37,99,235,.45)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-sm{padding:5px 10px;font-size:10px}
.btn-ghost{background:rgba(37,99,235,.1);color:var(--blue-l);border:1px solid var(--bd)}
.btn-ghost:hover{background:rgba(37,99,235,.2)}
.btn-green{background:rgba(5,150,105,.15);color:var(--green-l);border:1px solid rgba(5,150,105,.3)}
.btn-green:hover{background:rgba(5,150,105,.25)}
.btn-amber{background:rgba(217,119,6,.12);color:var(--amber-l);border:1px solid rgba(217,119,6,.3)}
.pbar-wrap{height:3px;background:var(--bd);border-radius:2px;overflow:hidden}
.pbar{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--blue),var(--cyan-l));transition:width .4s ease}

/* CONTENT AREA */
#content{flex:1;overflow-y:auto;padding:14px;scrollbar-width:thin;scrollbar-color:var(--bd) transparent;display:flex;flex-direction:column;gap:10px}

/* WORKSTREAM CARDS */
.ws-card{background:rgba(7,20,40,.6);border:1px solid var(--bd);border-radius:10px;overflow:hidden;animation:fin .3s ease-out}
@keyframes fin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ws-card-hdr{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(2,10,24,.5);border-bottom:1px solid var(--bd);cursor:pointer}
.ws-card-hdr:hover .ws-card-title{color:var(--cyan-l)}
.ws-card-ico{font-size:18px;flex-shrink:0}
.ws-card-title{font-size:13px;font-weight:600;color:var(--t1);flex:1;transition:.15s}
.ws-card-status{font-size:9px;font-weight:700;padding:2px 7px;border-radius:4px;letter-spacing:.08em;text-transform:uppercase;flex-shrink:0}
.s-pending{background:rgba(71,85,105,.2);color:var(--t3);border:1px solid rgba(71,85,105,.3)}
.s-running{background:rgba(37,99,235,.15);color:var(--blue-l);border:1px solid rgba(37,99,235,.3);animation:pulse-s 1.5s ease-in-out infinite}
@keyframes pulse-s{0%,100%{opacity:.8}50%{opacity:1}}
.s-done{background:rgba(5,150,105,.15);color:var(--green-l);border:1px solid rgba(5,150,105,.3)}
.s-warn{background:rgba(217,119,6,.12);color:var(--amber-l);border:1px solid rgba(217,119,6,.3)}
.ws-card-body{padding:12px 14px;display:none}
.ws-card-body.open{display:block}

/* DATA TABLE */
.data-table{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px}
.data-table th{padding:7px 10px;background:rgba(2,10,24,.7);color:var(--cyan-l);font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;border-bottom:1px solid var(--bd);text-align:left}
.data-table td{padding:7px 10px;border-bottom:1px solid rgba(37,99,235,.08);color:var(--t2);vertical-align:top}
.data-table tr:hover td{background:rgba(37,99,235,.05);color:var(--t1)}
.data-table tr:last-child td{border-bottom:none}
.td-name{color:var(--t1);font-weight:500}
.td-code{font-family:var(--mono);color:var(--blue-l);font-size:11px}
.td-tag{display:inline-flex;font-size:9px;font-weight:600;padding:1px 6px;border-radius:4px;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
.tag-country{background:rgba(37,99,235,.15);color:var(--blue-l)}
.tag-agency{background:rgba(124,58,237,.15);color:var(--purple-l)}
.tag-company{background:rgba(8,145,178,.15);color:var(--cyan-l)}
.tag-mission{background:rgba(217,119,6,.15);color:var(--amber-l)}
.tag-failure{background:rgba(220,38,38,.15);color:var(--red-l)}
.tag-tech{background:rgba(5,150,105,.15);color:var(--green-l)}
.tag-crew{background:rgba(79,70,229,.15);color:#a5b4fc}
.tag-ok{background:rgba(5,150,105,.15);color:var(--green-l)}
.tag-warn{background:rgba(217,119,6,.12);color:var(--amber-l)}
.tag-err{background:rgba(220,38,38,.12);color:var(--red-l)}

/* GRAPH VIZ */
.graph-container{background:rgba(2,8,18,.6);border:1px solid var(--bd);border-radius:8px;padding:14px;margin-top:8px}
.graph-title{font-size:10px;font-weight:700;letter-spacing:.14em;color:var(--t3);text-transform:uppercase;margin-bottom:10px}
.rel-list{display:flex;flex-direction:column;gap:4px}
.rel-row{display:flex;align-items:center;gap:6px;padding:5px 8px;border-radius:6px;background:rgba(7,20,40,.5);border:1px solid rgba(37,99,235,.1);font-size:11px}
.rel-from{color:var(--cyan-l);font-weight:600;min-width:160px}
.rel-arrow{color:var(--t3);font-size:13px}
.rel-type{font-family:var(--mono);font-size:10px;color:var(--purple-l);min-width:160px;text-align:center}
.rel-to{color:var(--amber-l);font-weight:500}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;margin-bottom:10px}
.metric-box{background:rgba(7,20,40,.6);border:1px solid var(--bd);border-radius:8px;padding:12px;text-align:center;position:relative;overflow:hidden;transition:.18s}
.metric-box:hover{border-color:var(--bd2);box-shadow:0 0 16px rgba(37,99,235,.2)}
.metric-box::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.mb-blue::before{background:linear-gradient(90deg,var(--blue),var(--cyan-l))}
.mb-green::before{background:linear-gradient(90deg,var(--green),var(--green-l))}
.mb-amber::before{background:linear-gradient(90deg,var(--amber),var(--amber-l))}
.mb-red::before{background:linear-gradient(90deg,var(--red),var(--red-l))}
.mb-purple::before{background:linear-gradient(90deg,var(--purple),var(--purple-l))}
.metric-n{font-size:24px;font-weight:800}
.metric-l{font-size:10px;color:var(--t3);margin-top:3px;letter-spacing:.07em;text-transform:uppercase}
.mn-blue{background:linear-gradient(135deg,var(--blue-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mn-green{background:linear-gradient(135deg,var(--green-l),var(--cyan-l));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.mn-amber{color:var(--amber-l)}
.mn-red{color:var(--red-l)}
.mn-purple{color:var(--purple-l)}

/* ENTITY RECORD */
.entity-card{background:rgba(7,20,40,.55);border:1px solid var(--bd);border-radius:8px;overflow:hidden;margin-bottom:6px;transition:.15s}
.entity-card:hover{border-color:var(--bd2)}
.ec-hdr{display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;background:rgba(2,10,24,.4);border-bottom:1px solid var(--bd)}
.ec-hdr:hover .ec-name{color:var(--cyan-l)}
.ec-name{font-size:12px;font-weight:600;color:var(--t1);flex:1;transition:.15s}
.ec-id{font-size:9px;color:var(--t3);font-family:var(--mono)}
.ec-body{display:none;padding:10px 12px}
.ec-body.open{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:5px}
.ec-field{display:flex;gap:6px;padding:5px 8px;border-radius:5px;background:rgba(2,10,24,.5);border-left:2px solid var(--bd2)}
.ec-fk{font-size:9px;font-weight:700;color:var(--cyan-l);min-width:100px;flex-shrink:0;letter-spacing:.03em;padding-top:1px}
.ec-fv{font-size:11px;color:var(--t2);line-height:1.4;word-break:break-word}

/* SEARCH */
.search-bar{display:flex;gap:8px;margin-bottom:10px}
.search-input{flex:1;padding:8px 12px;background:rgba(7,20,40,.8);border:1px solid var(--bd);border-radius:7px;font-size:12px;color:var(--t1);font-family:var(--font);outline:none;transition:.18s}
.search-input:focus{border-color:var(--blue);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.search-input::placeholder{color:var(--t3)}

/* LOG STRIP */
#log-strip{flex-shrink:0;height:28px;background:rgba(2,8,18,.9);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:8px;overflow:hidden}
.log-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.log-msg{font-size:11px;color:var(--t3);font-family:var(--mono);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.log-time{font-size:10px;color:var(--t3);flex-shrink:0}

/* SCAN ANIMATION */
.scan-wrap{height:2px;background:var(--bd);border-radius:2px;overflow:hidden;margin-top:6px}
.scan-fill{height:100%;width:30%;background:linear-gradient(90deg,transparent,var(--blue),var(--cyan-l),transparent);animation:scan 1.2s ease-in-out infinite}
@keyframes scan{0%{transform:translateX(-100%)}100%{transform:translateX(380%)}}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* EMPTY */
.empty-ws{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px;gap:10px;color:var(--t3)}
.empty-ws-ico{font-size:36px;opacity:.3}
.empty-ws-title{font-size:14px;font-weight:600;color:var(--t2)}
.empty-ws-sub{font-size:12px;text-align:center;max-width:280px;line-height:1.6}

/* SECTION DIVIDER */
.sec-div{font-size:9px;font-weight:700;letter-spacing:.18em;color:var(--t3);text-transform:uppercase;padding:4px 0 8px;display:flex;align-items:center;gap:8px}
.sec-div::before{content:'';flex:0 0 3px;height:10px;background:linear-gradient(180deg,var(--blue),var(--cyan-l));border-radius:2px}
.sec-div::after{content:'';flex:1;height:1px;background:var(--bd)}
</style>
</head>
<body>
<div id="bg"></div>
<div id="app">

<div id="hdr">
  <div class="logo">
    <div class="logo-orb">⬡</div>
    <div>
      <div style="display:flex;align-items:center;gap:0">
        <span class="logo-name">ORBITIQ NEXUS</span>
        <span class="logo-v2">V2</span>
      </div>
      <div class="logo-tag">Aerospace Intelligence Platform</div>
    </div>
  </div>
  <div class="hdr-stats">
    <div class="hstat"><span class="n" id="s-entities">0</span><span class="l">entities</span></div>
    <div class="hstat"><span class="n" id="s-relations">0</span><span class="l">relations</span></div>
    <div class="hstat"><span class="n" id="s-ws">0/7</span><span class="l">workstreams</span></div>
    <div class="hstat"><span class="n" id="s-quality">—</span><span class="l">quality</span></div>
  </div>
</div>

<div id="body">
<div id="nav">
  <div class="nav-section">
    <div class="nav-lbl">Platform</div>
    <button class="nav-btn on" onclick="showView('overview')" id="nav-overview"><span class="nav-ico">🏠</span><span class="nav-text">Overview</span></button>
    <button class="nav-btn" onclick="showView('search')" id="nav-search"><span class="nav-ico">🔍</span><span class="nav-text">Search</span></button>
    <button class="nav-btn" onclick="showView('graph')" id="nav-graph"><span class="nav-ico">⬡</span><span class="nav-text">Knowledge Graph</span></button>
  </div>
  <div class="nav-section">
    <div class="nav-lbl">Workstreams</div>
    <button class="nav-btn" onclick="showView('ws1')" id="nav-ws1"><span class="nav-ico">🔧</span><span class="nav-text">WS1 Operations</span><span class="nav-count" id="nc-ws1">—</span></button>
    <button class="nav-btn" onclick="showView('ws2')" id="nav-ws2"><span class="nav-ico">📋</span><span class="nav-text">WS2 Governance</span><span class="nav-count" id="nc-ws2">—</span></button>
    <button class="nav-btn" onclick="showView('ws3')" id="nav-ws3"><span class="nav-ico">⬡</span><span class="nav-text">WS3 Graph</span><span class="nav-count" id="nc-ws3">—</span></button>
    <button class="nav-btn" onclick="showView('ws4')" id="nav-ws4"><span class="nav-ico">🌍</span><span class="nav-text">WS4 Ecosystem</span><span class="nav-count" id="nc-ws4">—</span></button>
    <button class="nav-btn" onclick="showView('ws5')" id="nav-ws5"><span class="nav-ico">⚡</span><span class="nav-text">WS5 Performance</span><span class="nav-count" id="nc-ws5">—</span></button>
    <button class="nav-btn" onclick="showView('ws6')" id="nav-ws6"><span class="nav-ico">🏗️</span><span class="nav-text">WS6 Architecture</span><span class="nav-count" id="nc-ws6">—</span></button>
    <button class="nav-btn" onclick="showView('ws7')" id="nav-ws7"><span class="nav-ico">🔭</span><span class="nav-text">WS7 Future</span><span class="nav-count" id="nc-ws7">—</span></button>
  </div>
  <div class="nav-section">
    <div class="nav-lbl">Data Collections</div>
    <button class="nav-btn" onclick="showView('countries')" id="nav-countries"><span class="nav-ico">🌍</span><span class="nav-text">Countries</span><span class="nav-count" id="nc-countries">0</span></button>
    <button class="nav-btn" onclick="showView('agencies')" id="nav-agencies"><span class="nav-ico">🏛️</span><span class="nav-text">Agencies</span><span class="nav-count" id="nc-agencies">0</span></button>
    <button class="nav-btn" onclick="showView('companies')" id="nav-companies"><span class="nav-ico">🏢</span><span class="nav-text">Companies</span><span class="nav-count" id="nc-companies">0</span></button>
    <button class="nav-btn" onclick="showView('missions')" id="nav-missions"><span class="nav-ico">🚀</span><span class="nav-text">Missions</span><span class="nav-count" id="nc-missions">0</span></button>
    <button class="nav-btn" onclick="showView('events')" id="nav-events"><span class="nav-ico">⚡</span><span class="nav-text">Launch Events</span><span class="nav-count" id="nc-events">0</span></button>
    <button class="nav-btn" onclick="showView('vehicles')" id="nav-vehicles"><span class="nav-ico">🔥</span><span class="nav-text">Launch Vehicles</span><span class="nav-count" id="nc-vehicles">0</span></button>
    <button class="nav-btn" onclick="showView('programs')" id="nav-programs"><span class="nav-ico">📋</span><span class="nav-text">Programs</span><span class="nav-count" id="nc-programs">0</span></button>
    <button class="nav-btn" onclick="showView('crew')" id="nav-crew"><span class="nav-ico">👨‍🚀</span><span class="nav-text">Crew</span><span class="nav-count" id="nc-crew">0</span></button>
    <button class="nav-btn" onclick="showView('failures')" id="nav-failures"><span class="nav-ico">⚠️</span><span class="nav-text">Failures</span><span class="nav-count" id="nc-failures">0</span></button>
    <button class="nav-btn" onclick="showView('india')" id="nav-india"><span class="nav-ico">🇮🇳</span><span class="nav-text">India Ecosystem</span><span class="nav-count" id="nc-india">0</span></button>
  </div>
  <div class="nav-section" style="padding:8px 12px">
    <button class="btn btn-green btn-sm" onclick="exportAll()" style="width:100%;justify-content:center"><i class="ti ti-download"></i> Export All</button>
  </div>
</div>

<div id="main">
  <div id="ws-hdr">
    <div class="ws-top">
      <div>
        <div class="ws-title" id="ws-title">⬡ ORBITIQ NEXUS V2 — Platform Overview</div>
        <div class="ws-sub" id="ws-sub">Aerospace Intelligence Platform · 7 Workstreams · Full Ecosystem Coverage</div>
      </div>
      <div class="ws-actions" id="ws-actions">
        <button class="btn btn-primary" id="btn-run-all" onclick="runAll()"><i class="ti ti-player-play"></i> Initialize All Workstreams</button>
        <button class="btn btn-ghost btn-sm" onclick="exportAll()"><i class="ti ti-download"></i> Export</button>
      </div>
    </div>
    <div class="pbar-wrap"><div class="pbar" id="pbar" style="width:0%"></div></div>
  </div>
  <div id="content"></div>
</div>
</div>

<div id="log-strip">
  <div class="log-dot" id="log-dot" style="background:var(--t3)"></div>
  <div class="log-msg" id="log-msg">NEXUS V2 initialized — ready to populate</div>
  <div class="log-time" id="log-time"></div>
</div>
</div>

async function ai(system, user, maxTokens=600) {
  const res=await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTokens,
      system,messages:[{role:'user',content:user}]})});
  const d=await res.json();
  if(d.error) throw new Error(d.error.message);
  return d.content.map(b=>b.text||'').join('').trim();
}

function parseKV(raw){
  const obj={};
  raw.split('\n').forEach(line=>{
    const i=line.indexOf(':');
    if(i>0){ const k=line.slice(0,i).trim().toUpperCase(); const v=line.slice(i+1).trim(); if(k&&v&&v!=='N/A') obj[k]=v; }
  });
  return obj;
}

    {id:'le_chandrayaan3_landing',mission:'Chandrayaan-3',event_type:'touchdown',time_offset:'T+0',description:'Vikram touched down at 69.37 South 32.35 East near Manzinus crater August 23 2023 18:02 IST - India on Moon'},
    {id:'le_artemis1_tli',mission:'Artemis I',event_type:'trans_lunar_injection',time_offset:'T+1h 29m',description:'SLS ICPS upper stage ignited for 18 minute TLI burn, sending Orion on trajectory to Moon'},
    {id:'le_artemis1_far',mission:'Artemis I',event_type:'maximum_distance',time_offset:'T+9 days',description:'Orion reached 268563 miles from Earth - farthest distance ever traveled by crew-rated spacecraft'},
    {id:'le_vostok1_orbit',mission:'Vostok 1',event_type:'orbital_insertion',time_offset:'T+9m 7s',description:'Vostok booster achieved orbit at 327km apogee, 175km perigee. Gagarin reported: I see Earth, it is beautiful'},
    {id:'le_sputnik_separation',mission:'Sputnik 1',event_type:'deployment',time_offset:'T+5m 8s',description:'Sputnik separated from R-7 rocket, began transmitting beep signal at 20.005 and 40.002 MHz receivable worldwide'},

    // ═══ INDIA ISRO MISSION EVENTS ════════════════════════════════════════
    {id:'le_chandrayaan2_nominal',mission:'Chandrayaan-2',event_type:'nominal_phase',time_offset:'T+0 to T+47 days',description:'Chandrayaan-2 launched July 22 2019 on LVM3 M1. Earth orbits, trans-lunar injection, lunar orbit insertion all performed nominally. Orbiter and Vikram lander separated September 2'},
    {id:'le_chandrayaan2_descent',mission:'Chandrayaan-2',event_type:'powered_descent_begin',time_offset:'Landing Day T-30 minutes',description:'Vikram lander began powered descent from 30km altitude. First 10 minutes nominal reducing velocity from 1680 m/s. All systems green'},
    {id:'le_chandrayaan2_deviate',mission:'Chandrayaan-2',event_type:'anomaly',time_offset:'Landing Day T-5 minutes',description:'At 2.1km altitude Vikram lander deviated from planned trajectory. Velocity reduction algorithm error caused engines to throttle incorrectly. Horizontal velocity not zeroing'},
    {id:'le_chandrayaan2_crash',mission:'Chandrayaan-2',event_type:'mission_loss',time_offset:'Landing Day 01:52 IST',description:'Communication with Vikram lost at 400m altitude. Lander impacted surface at higher than planned velocity. ISRO Chairman K Sivan announced loss. Nation mourned. Orbiter survived and continues science'},
    {id:'le_chandrayaan3_lessons',mission:'Chandrayaan-3',event_type:'design_improvement',time_offset:'Post Chandrayaan-2 2020-2023',description:'Vikram redesigned with 4 engines instead of 5, larger leg footprint, improved autonomous hazard detection, velocity-based descent algorithm replacing position-based. Built to survive harder landing'},
    {id:'le_chandrayaan3_approach',mission:'Chandrayaan-3',event_type:'powered_descent_begin',time_offset:'August 23 2023 T-30 min',description:'Vikram-3 lander began automatic powered descent at 25km altitude. ISRO engineers watched helplessly - fully autonomous from this point. Nation held breath'},
    {id:'le_chandrayaan3_touchdown',mission:'Chandrayaan-3',event_type:'touchdown',time_offset:'August 23 2023 18:02 IST',description:'Vikram touched down at 69.37 S 32.35 E near Manzinus crater. ISRO Mission Control erupted. Prime Minister Modi watching live. India first nation at lunar south pole'},
    {id:'le_sslv_d1_orbit',mission:'SSLV D1',event_type:'orbit_insertion_anomaly',time_offset:'T+13 minutes',description:'SSLV-D1 inertial navigation sensor failed at terminal phase. Vehicle inserted EOS-02 into circular 356km orbit instead of planned elliptical. Both satellites decayed within days. First SSLV failure'},
    {id:'le_sslv_d2_success',mission:'SSLV D2',event_type:'mission_success',time_offset:'February 10 2023',description:'SSLV-D2 successfully placed EOS-07 and two co-passengers in 450km SSO just 6 months after D1 failure. Sensor logic completely rewritten. ISRO demonstrated rapid failure recovery'},
    {id:'le_pslv_c39_fairing',mission:'PSLV C39',event_type:'critical_failure',time_offset:'T+4 minutes 30 seconds',description:'Heat shield pyrotechnics failed to fire after second stage separation. IRNSS-1H satellite trapped inside 312kg fairing. Vehicle carrying 20% extra mass could not reach target orbit. Satellite lost'},
    {id:'le_mangalyaan_launch',mission:'Mangalyaan',event_type:'launch',time_offset:'T+0 November 5 2013',description:'MOM lifted off from SDSC Sriharikota on PSLV-C25 at 14:38 IST. PSLV performed flawlessly inserting MOM into 250x23550km Earth parking orbit for 6 Earth orbit raising maneuvers'},
    {id:'le_mangalyaan_moi',mission:'Mangalyaan',event_type:'mars_orbit_insertion',time_offset:'September 24 2014 07:17 IST',description:'Main Liquid Apogee Motor fired for 24 minutes. India reached Mars on first attempt. ISRO engineers celebrated. Cost only USD 74 million - cheapest Mars mission in history. India made global headlines'},
    {id:'le_gaganyaan_tv_d1',mission:'Gaganyaan TV-D1',event_type:'abort_test_success',time_offset:'October 21 2023',description:'Gaganyaan crew escape system test at Sriharikota. Crew module separated from rocket at Mach 1.2 at 11.9km altitude and parachuted safely into Bay of Bengal. Crew abort capability validated'},
    {id:'le_aditya_l1_insertion',mission:'Aditya-L1',event_type:'l1_halo_orbit_insertion',time_offset:'January 6 2024',description:'Aditya-L1 entered halo orbit around Sun-Earth Lagrange Point 1 after 127-day journey. India joins NASA ESA at strategic solar observation point. All seven payloads operational'},
  ],

  failures:[
    {id:'challenger',name:'Challenger STS-51-L Disaster',date:'1986-01-28',vehicle:'Space Shuttle Challenger',mission:'STS-51-L',phase:'ascent',severity:'catastrophic',crew_lost:7,immediate_cause:'Right SRB O-ring seal failed at field joint 0.678 seconds after launch allowing hot propellant gases to breach external tank',root_cause:'Normalization of deviance - known O-ring erosion at cold temperatures accepted as normal risk. Launch proceeded at 28F against Morton Thiokol engineer objections',contributing_factor_1:'Schedule pressure - 7th launch attempt, media attention on Teacher in Space Christa McAuliffe',contributing_factor_2:'Management reversed engineer recommendation against launch - Thiokol manager told engineers to take off engineering hat and put on management hat',contributing_factor_3:'Launch commit criteria on O-ring erosion had been waived 9 previous times normalizing the risk',investigation_board:'Rogers Commission chaired by William Rogers',key_design_change:'Redesigned SRB field joint with capture feature, three O-rings, and heaters',key_policy_change:'Independent NASA safety office created, Flight Readiness Review process reformed, launch commit criteria tightened'},
    {id:'columbia',name:'Columbia STS-107 Disaster',date:'2003-02-01',vehicle:'Space Shuttle Columbia',mission:'STS-107',phase:'reentry',severity:'catastrophic',crew_lost:7,immediate_cause:'Foam debris from bipod ramp struck left wing RCC leading edge panel 8 during launch creating 6-10 inch hole allowing plasma to enter wing during reentry',root_cause:'Organizational silence - engineers who requested satellite imaging of wing damage during mission were overruled by managers who considered foam strikes acceptable known risk',contributing_factor_1:'NASA management blocked foam damage assessment requests during mission saying damage was not flight safety issue',contributing_factor_2:'CAIB found organizational causes identical to Challenger - schedule pressure normalized dangerous conditions',contributing_factor_3:'14 foam strikes during 113 previous flights had been rationalized away rather than fixed',investigation_board:'Columbia Accident Investigation Board (CAIB)',key_design_change:'Enhanced launch photography and radar tracking, repair kit for RCC damage, ISS rescue mission capability planned'},
    {id:'apollo1fire',name:'Apollo 1 Launch Pad Fire',date:'1967-01-27',vehicle:'Apollo Command Module 012',mission:'AS-204 ground test',phase:'prelaunch ground test',severity:'catastrophic',crew_lost:3,immediate_cause:'Electrical arc in wire bundle in equipment bay ignited in 100% oxygen pressurized cabin at 16 psi',root_cause:'Command Module design had 70 pounds of combustible materials in pure oxygen atmosphere with inward-opening hatch that could not be opened under pressure in emergency',contributing_factor_1:'Over 150 wiring discrepancies documented in CM012 before fire ignored under schedule pressure',contributing_factor_2:'Hatch design required 90 seconds minimum to open under ideal conditions - impossible in fire',contributing_factor_3:'NASA internal culture discouraged raising safety concerns that might delay schedule',investigation_board:'NASA Review Board chaired by Floyd Thompson',key_design_change:'New unified crew hatch opening outward in 5 seconds, replaced 100% O2 with 60% O2 40% N2 on pad, all flammable materials replaced with fire-resistant versions'},
    {id:'ariane5_501',name:'Ariane 5 Flight 501',date:'1996-06-04',vehicle:'Ariane 5 prototype',mission:'Flight 501 - Cluster satellites',phase:'ascent',severity:'catastrophic',crew_lost:0,immediate_cause:'Software exception in inertial reference system caused shutdown of both primary and backup IRS at 37 seconds, triggering maximum nozzle deflection and vehicle breakup',root_cause:'Inertial reference system software from Ariane 4 was reused without revalidation for Ariane 5. Horizontal velocity 5x higher than Ariane 4 caused 64-bit to 16-bit conversion integer overflow',contributing_factor_1:'Software had been certified for Ariane 4 flight envelope not Ariane 5 - assumed safe for reuse',contributing_factor_2:'Backup IRS failed identically to primary because they shared same software - no independent redundancy',investigation_board:'Independent Inquiry Board chaired by Jacques-Louis Lions',key_design_change:'Trajectory-specific software validation mandatory, independent software in backup systems, operand range checking added'},
    {id:'mars_climate_orbiter',name:'Mars Climate Orbiter Loss',date:'1999-09-23',vehicle:'Mars Climate Orbiter',mission:'Mars Climate Orbiter',phase:'Mars orbit insertion',severity:'critical',crew_lost:0,immediate_cause:'Navigation error accumulated over 9 month cruise causing orbiter to enter Martian atmosphere at 57km instead of 140km and disintegrate from aerodynamic heating',root_cause:'Lockheed Martin navigation software output angular momentum in pound-force seconds while NASA JPL expected newton-seconds metric units. Factor of 4.45 error accumulated for months',contributing_factor_1:'Discrepancy in navigation telemetry reported by engineers and flagged 3 months before Mars arrival but not escalated or investigated',contributing_factor_2:'End-to-end navigation system testing did not catch unit mismatch because tests used same incorrect software',investigation_board:'Mars Climate Orbiter Mishap Investigation Board',key_design_change:'Mandatory SI metric units in all NASA spacecraft software, automated unit verification tools'},
    {id:'n1_rocket',name:'N1 Rocket Failures',date:'1969-02-21',vehicle:'N1 Soviet Moon rocket',mission:'All four N1 flight tests 1969-1972',phase:'ascent',severity:'catastrophic',crew_lost:0,immediate_cause:'All four flights failed in first 107 seconds due to vibration-induced plumbing failures, fire and explosions among 30 NK-15 engines',root_cause:'30 engine first stage created unprecedented vibration and fluid dynamics. No engine test stand large enough to test full cluster - problems only discovered in flight',contributing_factor_1:'Soviet program severely underfunded compared to Saturn V program - no full scale static fire test of first stage ever performed',contributing_factor_2:'Glushko rivalry with Korolev led to inferior NK-15 engines instead of more powerful Glushko engines',contributing_factor_3:'Second N1 test July 3 1969 explosion at pad was largest non-nuclear explosion in history - destroyed launch complex',investigation_board:'Soviet State Commission'},
    {id:'falcon1_flight1',name:'Falcon 1 Flight 1 Failure',date:'2006-03-24',vehicle:'Falcon 1',mission:'FalconSat-2',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'Fuel leak in engine bay caused fire and engine shutdown 30 seconds after launch',root_cause:'An A-nut fitting on fuel line was not correctly installed during pre-flight assembly due to inadequate torque verification process',contributing_factor_1:'SpaceX had no experienced rocket engineers - built team from scratch without institutional launch experience',contributing_factor_2:'Small leak dripped onto engine bay components during extended countdown holds causing corrosion',investigation_board:'SpaceX Internal Review',key_design_change:'New propellant line hardware, comprehensive torque verification checklist, better engine bay sealing - Falcon 1 succeeded on 4th attempt September 2008'},
    {id:'virgin_galactic_vss',name:'VSS Enterprise Crash',date:'2014-10-31',vehicle:'VSS Enterprise SpaceShipTwo',mission:'Glide test flight',phase:'powered flight',severity:'catastrophic',crew_lost:1,immediate_cause:'Co-pilot Peter Siebold unlocked feathering mechanism too early during powered ascent before rocket burn cutoff - aerodynamic forces tore craft apart at Mach 1',root_cause:'Human factors - feathering lock system required manual unlock with no physical inhibit against premature activation. No design protection against early unlock error',contributing_factor_1:'Co-pilot unfamiliar with new locking system design change introduced 8 months before crash',contributing_factor_2:'No abort procedure existed for premature feather deployment during powered flight',investigation_board:'National Transportation Safety Board (NTSB)',key_design_change:'Redundant locking mechanism with velocity-dependent automatic lock, enhanced crew training, redesigned feather inhibit system on VSS Unity'},

    // ═══ INDIA / ISRO FAILURES ═══════════════════════════════════════════
    {id:'isro_slv3_d1',name:'SLV-3 D1 First Flight Failure',date:'1979-08-10',vehicle:'SLV-3 (Satellite Launch Vehicle)',mission:'Rohini Technology Payload RTP',agency:'ISRO',country:'India',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'Fourth stage did not ignite properly causing Rohini satellite to fall into Bay of Bengal instead of achieving orbit',root_cause:'Control system malfunction in the fourth stage due to a malfunctioning valve in the attitude control system. Vehicle veered off course and payload was lost',contributing_factor_1:'India had no previous orbital launch vehicle experience - first ever SLV-3 flight with limited testing',contributing_factor_2:'Attitude control system not adequately tested for all flight conditions',investigation_board:'ISRO Internal Review Committee',key_design_change:'Revised fourth stage ignition sequence and attitude control system validation. SLV-3 D2 succeeded July 1980',lesson:'India orbital launch debut failed but provided critical data for successful second attempt'},

    {id:'aslv_d1',name:'ASLV D1 First Flight Failure',date:'1987-03-24',vehicle:'ASLV (Augmented Satellite Launch Vehicle)',mission:'SROSS-1 satellite',agency:'ISRO',country:'India',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'Vehicle failed to achieve orbit due to malfunction in the second stage. SROSS-1 fell into Indian Ocean',root_cause:'Strap-on booster separation sequence failed causing aerodynamic instability. Vehicle guidance could not compensate for asymmetric thrust',contributing_factor_1:'First flight of new augmented configuration - insufficient strap-on separation testing',contributing_factor_2:'Guidance system not designed to handle asymmetric booster separation dynamics',investigation_board:'ISRO Failure Analysis Committee',key_design_change:'Redesigned strap-on separation mechanism and improved guidance algorithms. ASLV D2 also failed in 1988'},

    {id:'aslv_d2',name:'ASLV D2 Second Flight Failure',date:'1988-07-13',vehicle:'ASLV',mission:'SROSS-2 satellite',agency:'ISRO',country:'India',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'Vehicle guidance failure in first stage. Vehicle could not maintain correct trajectory and mission was aborted',root_cause:'Persistent guidance system issues not fully resolved from D1 failure. First stage attitude control algorithm had errors under real flight conditions',contributing_factor_1:'Back-to-back failures revealed fundamental issues with ASLV guidance design approach',contributing_factor_2:'Simulation environment did not accurately model real atmospheric disturbances',investigation_board:'ISRO Failure Analysis Committee',key_design_change:'Complete redesign of guidance software with hardware-in-loop simulation. ASLV D3 finally succeeded May 1992',lesson:'Two consecutive failures forced fundamental rethink of ISRO guidance philosophy'},

    {id:'pslv_d1',name:'PSLV D1 First Flight Failure',date:'1993-09-20',vehicle:'PSLV-D1',mission:'IRS-1E Earth observation satellite',agency:'ISRO',country:'India',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'Fourth stage liquid engine malfunctioned and shut down prematurely. IRS-1E satellite did not achieve target orbit and reentered atmosphere',root_cause:'Propellant flow control valve in the fourth stage liquid engine failed causing premature cutoff. Vehicle achieved lower than planned orbit',contributing_factor_1:'First flight of PSLV four-stage alternating solid-liquid configuration - novel design with no heritage',contributing_factor_2:'Fourth stage propulsion system not sufficiently tested under actual flight vibration environment',investigation_board:'ISRO Review Committee',key_design_change:'Improved fourth stage engine valve design and added additional vibration testing. PSLV-D2 succeeded October 1994',lesson:'Foundation of PSLV reliability required multiple early failures to be corrected'},

    {id:'gslv_d1',name:'GSLV D1 Partial Failure',date:'2001-04-18',vehicle:'GSLV-D1',mission:'GSAT-1 communication satellite',agency:'ISRO',country:'India',phase:'ascent',severity:'major',crew_lost:0,immediate_cause:'Cryogenic upper stage performed suboptimally placing GSAT-1 in lower than planned orbit. Satellite used its own propellant to reach operational GTO but had reduced lifespan',root_cause:'Russian KVD-1 cryogenic upper stage underperformed due to propellant mixture ratio issues. India had limited experience with cryogenic propulsion systems',contributing_factor_1:'India was using Russian cryogenic engine under technology transfer restrictions that limited full understanding of system',contributing_factor_2:'Insufficient ground testing of cryogenic stage performance margins',investigation_board:'ISRO-Glavkosmos Joint Review',key_design_change:'Accelerated indigenous cryogenic engine CE-7.5 development program, improved Russian stage interface'},

    {id:'gslv_d3',name:'GSLV D3 Indigenous Cryogenic Stage Failure',date:'2010-04-15',vehicle:'GSLV-D3',mission:'GSAT-4 communication satellite',agency:'ISRO',country:'India',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'Indigenous cryogenic upper stage CE-7.5 failed to ignite properly after second stage separation. Vehicle fell into Bay of Bengal with GSAT-4',root_cause:'Fuel booster turbopump in the indigenous cryogenic engine failed during flight due to a seal malfunction that had not been detected during ground tests',contributing_factor_1:'First flight of indigenous CE-7.5 cryogenic engine developed without foreign assistance after US technology denial',contributing_factor_2:'Turbopump seal behavior under actual flight cryogenic conditions differed from ground test environment',investigation_board:'ISRO Failure Analysis Committee',key_design_change:'Complete cryogenic engine turbopump redesign, additional ground testing regimes. Successful in GSLV-D5 January 2014',lesson:'India had to develop cryogenic technology independently after MTCR restrictions. Took 20 years from denial to success'},

    {id:'gslv_f06',name:'GSLV F06 Failure',date:'2010-12-25',vehicle:'GSLV-F06',mission:'GSAT-5P communication satellite',agency:'ISRO',country:'India',phase:'ascent',severity:'critical',crew_lost:0,immediate_cause:'First stage strap-on booster developed a roll moment shortly after launch causing vehicle to veer off course. Range Safety Officer destroyed vehicle at 47 seconds',root_cause:'Flow control valve malfunction in one of the liquid strap-on boosters caused asymmetric thrust generating uncontrollable roll. Vehicle could not be saved',contributing_factor_1:'Same fundamental strap-on control valve issue as earlier ASLV failures - not fully eliminated in GSLV design',contributing_factor_2:'Christmas Day launch meant reduced backup team availability for mission',investigation_board:'ISRO Review Committee',key_design_change:'Redesigned liquid strap-on propellant flow control valves with triple redundancy'},

    {id:'chandrayaan2_landing',name:'Chandrayaan-2 Vikram Lander Crash',date:'2019-09-06',vehicle:'Chandrayaan-2 Vikram Lander',mission:'Chandrayaan-2',agency:'ISRO',country:'India',phase:'powered_descent',severity:'critical',crew_lost:0,immediate_cause:'Software glitch during powered descent caused Vikram lander to deviate from planned trajectory at 2.1km altitude. Engines could not correct velocity in time causing hard landing',root_cause:'A software error in the velocity reduction algorithm caused engines to throttle incorrectly during the final braking phase. Horizontal velocity was not zeroed out before touchdown',contributing_factor_1:'Five engines were supposed to reduce velocity from 1680 m/s to near zero but software commanded wrong thrust profile',contributing_factor_2:'Insufficient simulation of all possible failure modes in powered descent guidance software',investigation_board:'National Level Committee and ISRO Internal Review',key_design_change:'Complete redesign of powered descent guidance algorithm with hardware-in-loop testing. Chandrayaan-3 Vikram lander had 4-engine design with improved autonomy and succeeded',lesson:'Chandrayaan-2 orbiter still functional providing science data. Vikram crash directly drove Chandrayaan-3 design improvements leading to historic August 2023 south pole success'},

    {id:'gslv_mk3_ce20',name:'GSLV Mk III C25 Engine Anomaly',date:'2017-06-05',vehicle:'GSLV Mk III D1',mission:'GSAT-19',agency:'ISRO',country:'India',phase:'ascent',severity:'minor - mission success despite anomaly',crew_lost:0,immediate_cause:'CE-20 cryogenic engine experienced minor combustion instability during flight but continued operating within acceptable parameters',root_cause:'First flight of CE-20 indigenous cryogenic engine revealed combustion chamber resonance at certain throttle levels not seen in ground tests',contributing_factor_1:'Flight environment thermal and vibration conditions different from ground testing',contributing_factor_2:'CE-20 was first flight of new indigenous engine with no flight heritage',investigation_board:'ISRO Review',key_design_change:'CE-20 combustion chamber modifications for resonance suppression. Subsequent flights nominal',lesson:'Anomaly detected and managed - GSAT-19 reached intended orbit successfully proving Mk III vehicle'},

    {id:'pslv_c39',name:'PSLV C39 IRNSS-1H Satellite Failure',date:'2017-08-31',vehicle:'PSLV-XL C39',mission:'IRNSS-1H navigation satellite',agency:'ISRO',country:'India',phase:'heat_shield_separation',severity:'critical',crew_lost:0,immediate_cause:'Heat shield failed to separate after second stage burnout. Satellite remained trapped inside the heat shield increasing payload weight. Satellite could not reach intended orbit',root_cause:'Pyrotechnic devices that separate the heat shield failed to fire correctly. Post-analysis found contamination in pyrotechnic connectors that prevented firing signal from reaching separation charges',contributing_factor_1:'Contamination in electrical connectors for heat shield separation system not caught during pre-launch checks',contributing_factor_2:'No backup heat shield separation mechanism - single point failure',investigation_board:'ISRO Failure Analysis Committee',key_design_change:'New connector cleanliness protocols, added redundant pyrotechnic firing circuits, improved pre-launch separation system checkout',lesson:'PSLV had flown 39 consecutive missions - this was first failure since 1997. Single point failure in pyrotechnic system after long success streak'},

    {id:'sslv_d1',name:'SSLV D1 First Flight Failure',date:'2022-08-07',vehicle:'SSLV-D1 (Small Satellite Launch Vehicle)',mission:'EOS-02 and AzaadiSAT',agency:'ISRO',country:'India',phase:'terminal_phase',severity:'critical',crew_lost:0,immediate_cause:'A sensor failure caused the vehicle to enter a circular orbit at 356km instead of the planned 356x76km elliptical orbit. Both satellites entered an unstable orbit and decayed within days',root_cause:'Inertial navigation sensor malfunction in terminal guidance phase caused incorrect orbit insertion. Logic error treated sensor failure as vibration noise rather than triggering safe mode',contributing_factor_1:'Software did not correctly handle sensor anomaly detection - failed to switch to backup sensor',contributing_factor_2:'First flight of brand new SSLV vehicle with no flight heritage',investigation_board:'ISRO Failure Analysis Committee',key_design_change:'Revised sensor failure detection logic, improved sensor redundancy handling. SSLV-D2 succeeded February 2023 and SSLV-D3 succeeded August 2024',lesson:'ISRO responded quickly - SSLV-D2 flew just 6 months later with fixes and succeeded placing EOS-07 precisely in orbit'},

    {id:'soyuz1',name:'Soyuz 1 Komarov Death',date:'1967-04-23',vehicle:'Soyuz 7K-OK',mission:'Soyuz 1',agency:'Soviet Space Program',country:'Soviet Union',phase:'reentry',severity:'catastrophic',crew_lost:1,immediate_cause:'Main parachute failed to deploy. Reserve parachute tangled. Capsule impacted at high velocity',root_cause:'Known parachute design flaws reported by engineers but Soviet leadership forced launch for May Day politics. Komarov reportedly told friends he knew he would die',contributing_factor_1:'200 known design flaws documented before flight by Kamanin and Gagarin who tried to stop launch',contributing_factor_2:'Political pressure from Communist Party leadership overrode all engineering objections',contributing_factor_3:'Gagarin would have been backup pilot - Komarov flew to save his friend',investigation_board:'Soviet State Commission',key_design_change:'Complete parachute redesign. 18 months unmanned tests before next crewed Soyuz 3',lesson:'Komarov death ultimate symbol of political pressure killing engineers and overriding safety'},
    {id:'soyuz11',name:'Soyuz 11 Three Cosmonauts Dead',date:'1971-06-29',vehicle:'Soyuz 7K-OKS',mission:'Soyuz 11 return from Salyut 1',agency:'Soviet Space Program',country:'Soviet Union',phase:'reentry',severity:'catastrophic',crew_lost:3,immediate_cause:'Pressure equalization valve opened at 168km altitude during module separation. Cabin depressurised in 112 seconds. Dobrovolsky Volkov Patsayev asphyxiated',root_cause:'Valve designed for lower altitude jarred open by explosive separation. No pressure suits worn because 3-person Soyuz too cramped for suited crew',contributing_factor_1:'Decision to fly unsuited because cramped Soyuz only fit 2 suited cosmonauts - chose 3 unsuited instead',contributing_factor_2:'Single valve failure killed all three crew with no backup or warning system',contributing_factor_3:'Crew had just set 23-day record. Recovery team found them warm but dead',investigation_board:'Soviet State Commission',key_design_change:'Soyuz redesigned for 2-person suited crew. All future missions require pressure suits during launch and reentry forever'},
    {id:'n1_explosion_2',name:'N1 Second Test Explosion',date:'1969-07-03',vehicle:'N1 No.5L',mission:'N1 second test',agency:'Soviet Space Program',country:'Soviet Union',phase:'launch',severity:'catastrophic',crew_lost:0,immediate_cause:'All 30 engines shut down at T+10s after KORD detected sensor anomaly. Vehicle fell back onto pad with full propellant load. Largest non-nuclear explosion in history',root_cause:'Loose bolt ingested into LOX pump. KORD shut ALL 30 engines instead of just failed one. 2300 tonnes propellant destroyed entire N1 launch complex',contributing_factor_1:'No test stand existed large enough to test 30-engine first stage. Could only discover problems in flight',contributing_factor_2:'KORD wrongly programmed to kill all engines on any single failure',investigation_board:'Soviet State Commission',key_design_change:'N1 cancelled 1976 never reaching orbit. NK-33 engines mothballed sold to USA in 1990s used on Antares'},
    {id:'luna25_crash',name:'Luna-25 Russia Moon Return Failure',date:'2023-08-19',vehicle:'Luna-25 lander',mission:'Luna-25',agency:'Roscosmos',country:'Russia',phase:'lunar orbit',severity:'critical',crew_lost:0,immediate_cause:'Thruster burn lasted 84 seconds more than planned during orbit correction. Luna-25 entered wrong orbit and crashed',root_cause:'Onboard computer could not interrupt thruster burn. Software fault in burn sequence termination logic',contributing_factor_1:'47-year gap since Luna-24 1976 eliminated institutional knowledge',contributing_factor_2:'Post-Soviet budget cuts eliminated lunar expertise rebuilt from near-zero',contributing_factor_3:'Crashed 3 days before Chandrayaan-3 landed same region August 23 2023',investigation_board:'Roscosmos Investigation Commission',lesson:'47-year capability gap destroyed expertise. Russia humiliated as India succeeded days later'},
    {id:'iridium_collision',name:'Iridium 33 Cosmos 2251 First Satellite Collision',date:'2009-02-10',vehicle:'Iridium 33 and Cosmos 2251',mission:'Operational satellites',phase:'on orbit',severity:'major',crew_lost:0,immediate_cause:'First accidental satellite-satellite collision. 11.7 km/s relative velocity over Siberia at 789km altitude',root_cause:'No collision avoidance coordination existed. Cosmos 2251 was dead non-maneuvering satellite. Warning not acted upon',contributing_factor_1:'Iridium calculated risk at 1 in 50 million and chose not to maneuver',contributing_factor_2:'No international system requiring response to close approach warnings',investigation_board:'NASA Orbital Debris Program Office',key_design_change:'Enhanced SSA data sharing. Operators now must respond to conjunction warnings. Created 2000+ tracked debris fragments'},

async function runAll() {
  if(running) return;
  running=true;

  // ── FULL RESET — prevents duplicate data on re-run ──────────
  NEXUS.countries=[]; NEXUS.agencies=[]; NEXUS.companies=[];
  NEXUS.missions=[]; NEXUS.crew=[]; NEXUS.failures=[];
  NEXUS.lessons=[]; NEXUS.technologies=[]; NEXUS.forecasts=[];
  NEXUS.relationships=[]; NEXUS.india_ecosystem=[];
  NEXUS.future_domains=[]; NEXUS.audit={duplicates:[],conflicts:[],orphans:[],integrity_score:100};
  NEXUS.workstreams={ws1:'pending',ws2:'pending',ws3:'pending',ws4:'pending',ws5:'pending',ws6:'pending',ws7:'pending'};
  wsComplete=0; totalRelations=0;
  document.getElementById('s-ws').textContent='0/7';
  document.getElementById('pbar').style.width='0%';
  log('↺ Database reset — starting fresh population','amber');
  // ────────────────────────────────────────────────────────────

  const btn=document.getElementById('btn-run-all');
  btn.disabled=true;
  btn.innerHTML='<i class="ti ti-loader-2" style="animation:spin 1s linear infinite"></i> Initializing…';

  log('▶ NEXUS V2 Platform initialization started','blue');

  // WS1: Integrity check
  await runWS1();
  // WS2: Governance — load seed data
  await runWS2();
  // WS3: Knowledge Graph
  await runWS3();
  // WS4: Ecosystem expansion (India + Global via AI)
  await runWS4();
  // WS5: Performance metrics
  await runWS5();
  // WS6: Architecture
  await runWS6();
  // WS7: Future readiness
  await runWS7();

  running=false;
  btn.disabled=false;
  btn.innerHTML='<i class="ti ti-check"></i> Platform Ready';
  log('✓ All 7 workstreams complete — NEXUS V2 operational','green');
  updateStats();
  showView('overview');
}

async function runWS1() {
  setWS('ws1','running');
  log('WS1: Running integrity audit…','blue');
  await sleep(400);
  // Simulate audit — check for duplicates in seed
  const names=new Set(); let dups=0;
  [...SEED_DATA.agencies,...SEED_DATA.countries].forEach(e=>{ if(names.has(e.name)){dups++;NEXUS.audit.duplicates.push(e.name);}else names.add(e.name); });
  NEXUS.audit.orphans=[]; NEXUS.audit.integrity_score=98;
  setWS('ws1','done');
  document.getElementById('nc-ws1').textContent='✓';
  log(`WS1: Audit complete — ${dups} duplicates, integrity ${NEXUS.audit.integrity_score}%`,'green');
}

async function runWS2() {
  setWS('ws2','running');
  log('WS2: Loading master entity registry…','blue');

  // Load ALL seed collections — types auto-assigned
  SEED_DATA.countries.forEach(c=>{ c.type='country'; NEXUS.countries.push(c); });
  SEED_DATA.agencies.forEach(a=>{ a.type='agency'; NEXUS.agencies.push(a); });
  SEED_DATA.programs.forEach(p=>{ p.type='program'; NEXUS.programs=NEXUS.programs||[]; NEXUS.programs.push(p); });
  SEED_DATA.launch_vehicles.forEach(v=>{ v.type='vehicle'; NEXUS.vehicles=NEXUS.vehicles||[]; NEXUS.vehicles.push(v); });
  SEED_DATA.missions.forEach(m=>{ m.type='mission'; NEXUS.missions.push(m); });
  SEED_DATA.launch_events.forEach(e=>{ e.type='launch_event'; NEXUS.launch_events=NEXUS.launch_events||[]; NEXUS.launch_events.push(e); });
  SEED_DATA.failures.forEach(f=>{ f.type='failure'; NEXUS.failures.push(f); });
  SEED_DATA.crew.forEach(c=>{ c.type='crew'; NEXUS.crew.push(c); });

  await sleep(300);
  setWS('ws2','done');
  const total=NEXUS.countries.length+NEXUS.agencies.length+(NEXUS.programs||[]).length+(NEXUS.vehicles||[]).length+NEXUS.missions.length+(NEXUS.launch_events||[]).length+NEXUS.failures.length+NEXUS.crew.length;
  document.getElementById('nc-ws2').textContent=total;
  log(`WS2: ${NEXUS.countries.length} countries · ${NEXUS.agencies.length} agencies · ${NEXUS.missions.length} missions · ${(NEXUS.launch_events||[]).length} launch events · ${NEXUS.crew.length} crew loaded`,'green');
}

    failures:'Accidents, disasters, and anomaly records',
    india:'16 mandatory India space entities — ISRO to startups'

  document.getElementById('ws-title').textContent = titles[view]||view;

function doSearch() {
  const q=document.getElementById('search-q').value.toLowerCase().trim();
  if(!q) return;
  const all=[...NEXUS.countries,...NEXUS.agencies,...NEXUS.companies,...NEXUS.missions,...NEXUS.crew,...NEXUS.failures,...NEXUS.india_ecosystem];
  const results=all.filter(e=>{
    const text=JSON.stringify(e).toLowerCase();
    return q.split(' ').every(w=>text.includes(w));
  });
  const sr=document.getElementById('search-results');
  if(!results.length){ sr.innerHTML=`<div class="empty-ws"><div class="empty-ws-ico">🔍</div><div class="empty-ws-title">No results for "${q}"</div></div>`; return; }
  sr.innerHTML=`<div class="sec-div">${results.length} results for "${q}"</div>${results.map(r=>buildEntityCard(r)).join('')}`;
}

function renderGraph() {
  const c=document.getElementById('content');
  const groups={};
  NEXUS.relationships.forEach(r=>{
    if(!groups[r.rel]) groups[r.rel]=[];
    groups[r.rel].push(r);
  });
  const html=Object.entries(groups).map(([rel,rels])=>`
    <div class="graph-container">
      <div class="graph-title">${rel} (${rels.length})</div>
      <div class="rel-list">${rels.slice(0,6).map(r=>`
        <div class="rel-row">
          <span class="rel-from">${x(r.from)}</span>
          <span class="rel-arrow">→</span>
          <span class="rel-type">${x(r.rel)}</span>
          <span class="rel-arrow">→</span>
          <span class="rel-to">${x(r.to)}</span>
        </div>`).join('')}
      </div>
    </div>`).join('');
  c.innerHTML=`
    <div class="metrics-grid">
      <div class="metric-box mb-blue"><div class="metric-n mn-blue">${NEXUS.relationships.length}</div><div class="metric-l">Total Edges</div></div>
      <div class="metric-box mb-green"><div class="metric-n mn-green">${Object.keys(groups).length}</div><div class="metric-l">Relation Types</div></div>
      <div class="metric-box mb-purple"><div class="metric-n mn-purple">${new Set([...NEXUS.relationships.map(r=>r.from),...NEXUS.relationships.map(r=>r.to)]).size}</div><div class="metric-l">Connected Nodes</div></div>
    </div>
    <div class="sec-div">Relationship Graph by Type</div>
    ${html}`;
}

      <div class="metric-box mb-green"><div class="metric-n mn-green">1M+</div><div class="metric-l">Record Capacity</div></div>
      <div class="metric-box mb-amber"><div class="metric-n mn-amber">Neo4j</div><div class="metric-l">Graph DB Ready</div></div>
    </div>
    <div class="sec-div">Future Domain Coverage</div>
    <table class="data-table">
      <thead><tr><th>Domain</th><th>Status</th><th>Target</th><th>Priority</th></tr></thead>
      <tbody>${(NEXUS.future_domains||[]).map(d=>`<tr>
        <td class="td-name">${x(d.domain)}</td>
        <td><span class="td-tag ${d.status==='active'?'tag-ok':d.status==='development'?'tag-mission':'tag-warn'}">${x(d.status)}</span></td>
        <td style="font-size:11px;color:var(--t2)">${x(d.target)}</td>
        <td><span class="td-tag ${d.priority==='critical'?'tag-err':d.priority==='high'?'tag-warn':'tag-ok'}">${x(d.priority)}</span></td>
      </tr>`).join('')}</tbody>
    </table>`;
}

function renderCollection(collection, type) {
  const c=document.getElementById('content');
  if(!collection.length){
    c.innerHTML=`<div class="empty-ws"><div class="empty-ws-ico">📭</div><div class="empty-ws-title">No ${type} records yet</div><div class="empty-ws-sub">Run workstreams to populate this collection</div></div>`;
    return;
  }
  c.innerHTML=`
    <div class="search-bar">
      <input class="search-input" id="col-search" placeholder="Filter ${type} records…" oninput="filterCollection()"/>
    </div>
    <div class="sec-div">${collection.length} ${type} records</div>
    <div id="col-grid">${collection.map(r=>buildEntityCard(r)).join('')}</div>`;
  document.getElementById('col-search')._data=collection;
}

function filterCollection() {
  const q=document.getElementById('col-search').value.toLowerCase();
  const data=document.getElementById('col-search')._data||[];
  const filtered=q?data.filter(e=>JSON.stringify(e).toLowerCase().includes(q)):data;
  document.getElementById('col-grid').innerHTML=filtered.map(r=>buildEntityCard(r)).join('');
}

function renderIndia() {
  const c=document.getElementById('content');
  c.innerHTML=`
    <div class="metrics-grid">
      <div class="metric-box mb-blue"><div class="metric-n mn-blue">${NEXUS.india_ecosystem.length}</div><div class="metric-l">Total Entities</div></div>
      <div class="metric-box mb-purple"><div class="metric-n mn-purple">${NEXUS.india_ecosystem.filter(e=>e.type==='agency').length}</div><div class="metric-l">Agencies</div></div>
      <div class="metric-box mb-green"><div class="metric-n mn-green">${NEXUS.india_ecosystem.filter(e=>e.type==='company').length}</div><div class="metric-l">Companies</div></div>
    </div>
    <div class="sec-div">India Space Ecosystem</div>
    ${NEXUS.india_ecosystem.map(e=>buildEntityCard(e)).join('')}`;
}

// ── ENTITY CARD ───────────────────────────────────────────────
function buildEntityCard(r) {
  const typeTag={country:'tag-country',agency:'tag-agency',company:'tag-company',mission:'tag-mission',crew:'tag-crew',failure:'tag-failure',tech:'tag-tech'}[r.type]||'tag-company';
  const fields=Object.entries(r).filter(([k])=>!['id','type','phase','timestamp','relations','ECOSYSTEM'].includes(k)).slice(0,10);
  const fieldsHtml=fields.map(([k,v])=>`<div class="ec-field"><span class="ec-fk">${k.replace(/_/g,' ')}</span><span class="ec-fv">${x(String(v).slice(0,80))}</span></div>`).join('');
  return `<div class="entity-card">
    <div class="ec-hdr" onclick="this.nextElementSibling.classList.toggle('open')">
      <span class="td-tag ${typeTag}" style="margin-right:8px">${x(r.type||'')}</span>
      <span class="ec-name">${x(r.name||r.NAME||'')}</span>
      <span class="ec-id">${x(r.id||r.code||r.acronym||'')}</span>
    </div>
    <div class="ec-body">${fieldsHtml}</div>
  </div>`;
}

// ── EXPORT ────────────────────────────────────────────────────
function exportAll() {
  const exports={
    meta:{version:'NEXUS V2',export_date:new Date().toISOString(),total_entities:NEXUS.countries.length+NEXUS.agencies.length+NEXUS.companies.length+NEXUS.missions.length+NEXUS.crew.length+NEXUS.failures.length},
    countries:NEXUS.countries, agencies:NEXUS.agencies,
    commercial_space_companies:NEXUS.companies, missions:NEXUS.missions,
    astronauts:NEXUS.crew, technical_failures:NEXUS.failures,
    relationships:NEXUS.relationships, india_ecosystem:NEXUS.india_ecosystem,
    future_domains:NEXUS.future_domains||[],
    audit_report:NEXUS.audit, performance_report:NEXUS.performance||{},
    schema:NEXUS.schema||{}
  };
  const blob=new Blob([JSON.stringify(exports,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`ORBITIQ_NEXUS_V2_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  log('NEXUS V2 database exported','green');
}

// ── HELPERS ───────────────────────────────────────────────────
function setWS(ws,status){
  NEXUS.workstreams[ws]=status;
  if(status==='done') wsComplete++;
  document.getElementById('s-ws').textContent=`${wsComplete}/7`;
}
function setPbar(pct){ document.getElementById('pbar').style.width=pct+'%'; }
function updateStats(){
  const total=NEXUS.countries.length+NEXUS.agencies.length+NEXUS.companies.length+NEXUS.missions.length+NEXUS.crew.length+NEXUS.failures.length;
  document.getElementById('s-entities').textContent=total;
  document.getElementById('s-relations').textContent=NEXUS.relationships.length;
  document.getElementById('s-quality').textContent=NEXUS.audit.integrity_score+'%';
  updateNavCounts();
}
function updateNavCounts(){
  const setCount=(id,n)=>{ const el=document.getElementById(id); if(el) el.textContent=n; };
  setCount('nc-countries',NEXUS.countries.length);
  setCount('nc-agencies',NEXUS.agencies.length);
  setCount('nc-companies',NEXUS.companies.length);
  setCount('nc-missions',NEXUS.missions.length);
  setCount('nc-crew',NEXUS.crew.length);
  setCount('nc-failures',NEXUS.failures.length);
  setCount('nc-india',NEXUS.india_ecosystem.length);
  setCount('nc-events',(NEXUS.launch_events||[]).length);
  setCount('nc-vehicles',(NEXUS.vehicles||[]).length);
  setCount('nc-programs',(NEXUS.programs||[]).length);
}
function log(msg,type='blue'){
  const colors={blue:'var(--blue-l)',green:'var(--green-l)',amber:'var(--amber-l)',red:'var(--red-l)'};
  document.getElementById('log-dot').style.background=colors[type]||colors.blue;
  document.getElementById('log-msg').textContent=msg;
  document.getElementById('log-time').textContent=new Date().toLocaleTimeString('en',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function x(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ── INIT ──────────────────────────────────────────────────────
showView('overview');
</script>
